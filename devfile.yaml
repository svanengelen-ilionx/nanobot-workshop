schemaVersion: 2.2.2
metadata:
  name: nanobot-workshop
  displayName: NanoBot AI Assistant Workshop
  description: Workshop environment for exploring the NanoBot AI assistant
  tags:
    - Python
    - AI
    - NanoBot
  version: 1.0.0

components:
  - name: nanobot
    container:
      image: harbor.openshift-sandbox.ilionx-ocp.com:60443/nanobot/nanobot-workshop:latest
      memoryLimit: 2Gi
      memoryRequest: 512Mi
      cpuLimit: "2"
      cpuRequest: 250m
      mountSources: true
      sourceMapping: /projects
      env:
        - name: HOME
          value: /home/user
      endpoints:
        - name: nanobot-gateway
          targetPort: 18790
          exposure: public
          protocol: https
        - name: webapp
          targetPort: 8080
          exposure: public
          protocol: https

commands:
  - id: init-nanobot-src
    exec:
      component: nanobot
      commandLine: |
        # Copy nanobot source into the workspace so users can edit it
        PROJECT_DIR=$(find /projects -maxdepth 1 -type d | grep -v "^/projects$" | head -n 1)
        TARGET="${PROJECT_DIR}/nanobot-src"
        if [ -n "$PROJECT_DIR" ] && [ ! -d "$TARGET/src" ]; then
          echo "Copying nanobot source into workspace..."
          cp -a /app/nanobot-src "$TARGET"
          echo "Re-installing nanobot in editable mode from workspace copy..."
          cd "$TARGET" && uv pip install --system --no-cache -e . 2>&1
          echo "Done. Nanobot source is at $TARGET — Python edits take effect immediately."
        elif [ -d "$TARGET/src" ]; then
          # Source already in workspace (e.g. workspace restart); re-link editable install
          cd "$TARGET" && uv pip install --system --no-cache -e . 2>&1
          echo "Nanobot re-linked from workspace source."
        fi

  - id: init-symlink
    exec:
      component: nanobot
      commandLine: |
        # Link into the project folder so it shows up in the VS Code explorer
        PROJECT_DIR=$(find /projects -maxdepth 1 -type d | grep -v "^/projects$" | head -n 1)
        if [ -n "$PROJECT_DIR" ]; then
          [ -L "$PROJECT_DIR/nanobot-home" ] || ln -s $HOME/.nanobot "$PROJECT_DIR/nanobot-home"
        fi

  - id: nanobot-status
    exec:
      label: "NanoBot: Show Status"
      component: nanobot
      commandLine: nanobot status
      group:
        kind: run

  - id: nanobot-chat
    exec:
      label: "NanoBot: Interactive Chat"
      component: nanobot
      commandLine: nanobot agent
      group:
        kind: run

  - id: nanobot-gateway
    exec:
      label: "NanoBot: Start Gateway (Telegram)"
      component: nanobot
      commandLine: nanobot gateway
      group:
        kind: run

  - id: nanobot-rebuild
    exec:
      label: "NanoBot: Rebuild from Source"
      component: nanobot
      commandLine: |
        PROJECT_DIR=$(find /projects -maxdepth 1 -type d | grep -v "^/projects$" | head -n 1)
        TARGET="${PROJECT_DIR}/nanobot-src"
        if [ -d "$TARGET" ]; then
          echo "Re-installing nanobot from $TARGET..."
          cd "$TARGET" && uv pip install --system --no-cache -e .
          if [ -d "$TARGET/bridge" ]; then
            echo "Rebuilding bridge..."
            cd "$TARGET/bridge" && npm run build
          fi
          echo "Rebuild complete."
        else
          echo "Error: nanobot source not found at $TARGET"
          exit 1
        fi
      group:
        kind: build

  - id: auto-config
    exec:
      component: nanobot
      commandLine: |
        # Auto-configure from OpenShift secret if available
        CONFIG_FILE="${HOME}/.nanobot/config.json"
        if [ -n "${ANTHROPIC_API_KEY:-}" ]; then
          EXISTING_KEY=$(jq -r '.providers.anthropic.apiKey // empty' "${CONFIG_FILE}" 2>/dev/null || true)
          if [ "${EXISTING_KEY}" != "${ANTHROPIC_API_KEY}" ]; then
            cat > "${CONFIG_FILE}" <<EOF
        {
          "providers": {
            "anthropic": {
              "apiKey": "${ANTHROPIC_API_KEY}",
              "apiBase": "https://ai.krijskraan.nl/anthropic"
            }
          },
          "agents": {
            "defaults": {
              "model": "anthropic/claude-sonnet-4"
            }
          }
        }
        EOF
            echo "NanoBot config auto-configured from OpenShift secret."
          fi
        fi

  - id: setup-config
    exec:
      label: "Workshop: Setup Config"
      component: nanobot
      commandLine: |
        if [ ! -f $HOME/.nanobot/config.json ] || [ "$(cat $HOME/.nanobot/config.json)" = "{}" ]; then
          cp /app/config-template.json $HOME/.nanobot/config.json
          echo "Config template copied to ~/.nanobot/config.json"
          echo "Edit it with: nano ~/.nanobot/config.json"
        else
          echo "Config already exists at ~/.nanobot/config.json"
        fi
      group:
        kind: build

events:
  postStart:
    - init-nanobot-src
    - init-symlink
    - auto-config